name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run prisma:generate

      - run: npm run typecheck

      - run: npm run lint

      - name: Run tests
        run: npm test

      - run: npm run build
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/elyto
          DIRECT_URL: postgresql://user:pass@localhost:5432/elyto
          NEXTAUTH_SECRET: ci-build-secret-min-32-chars-long
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
